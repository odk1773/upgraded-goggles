<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네버랜드 기념 사진 저장하기</title>
    <style>
        body { text-align: center; background: #f9f9f9; padding-top: 40px; font-family: sans-serif; color: #333; }
        h2 { font-size: 22px; color: #5d5d5d; }
        p { font-size: 14px; color: #888; margin-bottom: 25px; }
        .photo-container { width: 90%; max-width: 500px; margin: 0 auto; }
        img { width: 100%; height: auto; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

    <h2>🧚 네버랜드 세상 속 나의 모습!</h2>
    <p>이미지를 꾹 누르면 스마트폰에 저장할 수 있습니다.</p>
    
    <div class="photo-container">
        <img src="./photo1.png" alt="사진을 불러오는 중...">
    </div>

</body>
</html>
